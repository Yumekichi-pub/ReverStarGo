<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ReverStarGo イベントチェッカ v0.5</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Yu Gothic", "Meiryo", sans-serif;
    background: #2a2118;
    color: #f0e8d0;
    height: 100vh;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    height: 100vh;
  }
  /* === 左パネル: 操作 === */
  #left {
    background: #3a2e20;
    border-right: 2px solid #5a4530;
    padding: 12px;
    overflow-y: auto;
  }
  #left h1 {
    font-size: 16px;
    margin: 0 0 10px 0;
    color: #f0c878;
    border-bottom: 2px double #8a6a3a;
    padding-bottom: 6px;
  }
  .btn {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    background: #6a4520;
    color: #f0e8d0;
    border: 1px solid #8a6a3a;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { background: #8a5a30; }
  .btn.warn { background: #803020; border-color: #a04030; }
  .btn.warn:hover { background: #a04030; }
  .btn.ok { background: #205020; border-color: #408040; }
  .btn.ok:hover { background: #408040; }
  .btn.run { background: #1a4a6a; border-color: #2a6a9a; }
  .btn.run:hover { background: #2a6a9a; }
  .btn.run.running { background: #6a3a1a; border-color: #9a5a2a; animation: pulse-run 1.2s ease-in-out infinite; }
  @keyframes pulse-run { 0%,100%{opacity:1} 50%{opacity:0.7} }
  .auto-progress { font-size:10px; color:#80c0ff; margin:4px 0; padding:4px 6px; background:#1a2a3a; border-radius:3px; display:none; }
  .auto-progress.active { display:block; }
  .summary {
    margin: 12px 0;
    padding: 10px;
    background: #4a3a28;
    border: 1px solid #6a5a40;
    border-radius: 4px;
    font-size: 12px;
  }
  .summary .row {
    display: flex;
    justify-content: space-between;
    margin: 3px 0;
  }
  .summary .lbl { color: #c0a878; }
  .summary .val { color: #f0e8d0; font-weight: bold; }
  .log {
    margin-top: 12px;
    padding: 8px;
    background: #1a1208;
    border: 1px solid #4a3a20;
    border-radius: 4px;
    font-size: 10px;
    font-family: Consolas, monospace;
    max-height: 240px;
    overflow-y: auto;
    line-height: 1.4;
  }
  .log .e { color: #ff8080; }
  .log .w { color: #ffc060; }
  .log .i { color: #80c0ff; }
  .log .ok { color: #80ff80; }

  /* === 中央: iframe === */
  #center {
    background: #1a1208;
    position: relative;
    overflow: hidden;
  }
  #game-iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
  }
  #overlay {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    color: #f0e8d0;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 4px;
    pointer-events: none;
  }

  /* === 右パネル: イベント一覧 === */
  #right {
    background: #3a2e20;
    border-left: 2px solid #5a4530;
    padding: 12px;
    overflow-y: auto;
  }
  #right h2 {
    font-size: 14px;
    margin: 0 0 8px 0;
    color: #f0c878;
    border-bottom: 1px solid #6a5a40;
    padding-bottom: 4px;
  }
  .cat {
    margin-bottom: 12px;
  }
  .cat-head {
    font-size: 12px;
    color: #f0c878;
    cursor: pointer;
    padding: 4px 6px;
    background: #4a3a28;
    border-left: 4px solid #8a6a3a;
    user-select: none;
  }
  .cat-head .pct { float: right; color: #c0a878; }
  .cat-body {
    display: none;
    padding: 4px 0 4px 8px;
  }
  .cat.open .cat-body { display: block; }
  .item {
    font-size: 10px;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    line-height: 1.3;
  }
  .item .mark {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .item .id {
    width: 56px;
    color: #a0906a;
    font-family: Consolas, monospace;
    flex-shrink: 0;
  }
  .item .nm {
    flex: 1;
    color: #d0c0a0;
  }
  .item.fired .nm { color: #80ff80; }
  .item.fired .mark { color: #80ff80; }
  .item.failed .nm { color: #ff8080; }
  .item.failed .mark { color: #ff8080; }

  /* ANTI list special styling */
  .anti-item.tripped .nm { color: #ff4040; font-weight: bold; }
  .anti-item.tripped .mark { color: #ff4040; }

  .filter {
    margin: 8px 0;
    display: flex;
    gap: 4px;
  }
  .filter button {
    flex: 1;
    background: #4a3a28;
    border: 1px solid #6a5a40;
    color: #f0e8d0;
    padding: 4px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
  }
  .filter button.active {
    background: #6a4520;
    border-color: #8a6a3a;
  }
</style>
</head>
<body>
<div id="app">
  <!-- 左パネル -->
  <div id="left">
    <h1>🔍 イベントチェッカ v0.5</h1>

    <button class="btn ok" id="btn-load">▶ ゲーム読込／再起動</button>
    <button class="btn" id="btn-install">🔌 フック注入</button>
    <button class="btn warn" id="btn-reset">↺ 状態リセット</button>
    <button class="btn" id="btn-expand">↕ 全カテゴリ展開／折畳</button>
    <hr style="border-color:#5a4530;margin:10px 0;">
    <button class="btn run" id="btn-auto">🤖 自動テスト開始</button>
    <div class="auto-progress" id="auto-progress"></div>

    <div class="summary">
      <div class="row"><span class="lbl">EVENT 発火</span><span class="val" id="sum-event">0 / 131</span></div>
      <div class="row"><span class="lbl">ANTI 監視</span><span class="val" id="sum-anti">0 / 20</span></div>
      <div class="row"><span class="lbl">フック状態</span><span class="val" id="sum-hook">未注入</span></div>
      <div class="row"><span class="lbl">最終イベント</span><span class="val" id="sum-last">-</span></div>
    </div>

    <div style="font-size:11px;color:#c0a878;margin-top:8px;">
      使い方：「ゲーム読込」でゲーム本体を iframe に読み込み、「フック注入」で監視を開始。あとは普通にプレイすれば右側のリストが ✅ になっていきます。
    </div>

    <div class="log" id="log"></div>
  </div>

  <!-- 中央 -->
  <div id="center">
    <iframe id="game-iframe" src="about:blank"></iframe>
    <div id="overlay">ReverStarGo（監視対象）</div>
  </div>

  <!-- 右パネル -->
  <div id="right">
    <h2>📒 EVENT 台帳（131）</h2>
    <div class="filter">
      <button data-f="all" class="active">全部</button>
      <button data-f="fired">✅ のみ</button>
      <button data-f="unfired">未発火のみ</button>
    </div>
    <div id="event-list"></div>

    <h2 style="margin-top:16px;">🚫 ANTI 台帳（20）</h2>
    <div id="anti-list"></div>
  </div>
</div>

// =========================================================================
// 状態管理
// =========================================================================
const state = {
  fired: new Set(),       // 発火済み EVENT id
  tripped: new Set(),     // 発生してしまった ANTI id
  hooked: false,
  lastEvent: "-",
  autoTesting: false,     // 自動テスト中フラグ
};

const log = (msg, cls = "i") => {
  const el = document.getElementById("log");
  const t = new Date().toLocaleTimeString();
  el.insertAdjacentHTML("afterbegin", `<div class="${cls}">[${t}] ${msg}</div>`);
};

const fire = (id) => {
  if (!state.fired.has(id)) {
    state.fired.add(id);
    state.lastEvent = id;
    updateUI();
  }
};
const trip = (id, detail = "") => {
  if (!state.tripped.has(id)) {
    state.tripped.add(id);
    log(`❌ ${id} 発生 ${detail}`, "e");
    updateUI();
  }
};

// =========================================================================
// UI 構築
// =========================================================================
function buildEventList() {
  const list = document.getElementById("event-list");
  const cats = {};
  for (const ev of EVENTS) {
    (cats[ev.cat] ||= []).push(ev);
  }
  let html = "";
  for (const [cat, items] of Object.entries(cats)) {
    html += `<div class="cat" data-cat="${cat}">
      <div class="cat-head" onclick="toggleCat(this)">${cat} (${items.length})<span class="pct" data-pct></span></div>
      <div class="cat-body">`;
    for (const it of items) {
      html += `<div class="item" data-id="${it.id}">
        <span class="mark">○</span>
        <span class="id">${it.id}</span>
        <span class="nm">${it.name}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  list.innerHTML = html;
}
function buildAntiList() {
  const list = document.getElementById("anti-list");
  let html = "";
  for (const a of ANTIS) {
    html += `<div class="item anti-item" data-id="${a.id}">
      <span class="mark">${a.sev}</span>
      <span class="id">${a.id}</span>
      <span class="nm">${a.name}</span>
    </div>`;
  }
  list.innerHTML = html;
}
function toggleCat(el) {
  el.parentElement.classList.toggle("open");
}
function updateUI() {
  document.getElementById("sum-event").textContent = `${state.fired.size} / ${EVENTS.length}`;
  document.getElementById("sum-anti").textContent = `${ANTIS.length - state.tripped.size} / ${ANTIS.length}`;
  document.getElementById("sum-hook").textContent = state.hooked ? "✅ 注入済" : "未注入";
  document.getElementById("sum-last").textContent = state.lastEvent;

  for (const ev of EVENTS) {
    const el = document.querySelector(`.item[data-id="${ev.id}"]`);
    if (!el) continue;
    if (state.fired.has(ev.id)) {
      el.classList.add("fired");
      el.querySelector(".mark").textContent = "✅";
    }
  }
  for (const a of ANTIS) {
    const el = document.querySelector(`.anti-item[data-id="${a.id}"]`);
    if (!el) continue;
    if (state.tripped.has(a.id)) {
      el.classList.add("tripped");
      el.querySelector(".mark").textContent = "❌";
    }
  }

  // カテゴリ別集計
  const cats = {};
  for (const ev of EVENTS) {
    cats[ev.cat] ||= { total: 0, fired: 0 };
    cats[ev.cat].total++;
    if (state.fired.has(ev.id)) cats[ev.cat].fired++;
  }
  for (const [cat, c] of Object.entries(cats)) {
    const el = document.querySelector(`.cat[data-cat="${cat}"] [data-pct]`);
    if (el) el.textContent = `${c.fired}/${c.total}`;
  }
}

// =========================================================================
// フック注入
// =========================================================================
function getIframeWin() {
  return document.getElementById("game-iframe").contentWindow;
}

// 本体スクリプトの let/const 変数は window プロパティにならないため、
// iframe 内で eval して取得する。
function ev(w, expr, fallback) {
  try {
    return w.eval(expr);
  } catch (e) {
    return fallback;
  }
}

// 盤面のスナップショット（{key: 'black'|'white'|null}）
function snapBoard(w) {
  return ev(w,
    `(() => { const o = {}; for (const k of Object.keys(board)) o[k] = board[k]; return o; })()`,
    null);
}

// 現在のプレイヤー
function getCurrent(w) {
  return ev(w, "typeof current !== 'undefined' ? current : null", null);
}

// 黒/白の盤上石数
function countBoard(w) {
  return ev(w, `(() => {
    let nB=0,nW=0,nE=0,cp=null;
    for (const k of Object.keys(board)) {
      const v = board[k];
      if (k === '0,0,0') { cp = v; continue; }
      if (v === 'black') nB++;
      else if (v === 'white') nW++;
      else nE++;
    }
    return {nB,nW,nE,cp,total:nB+nW+nE+1};
  })()`, null);
}

// 取得済み石数
function getCaptured(w) {
  return ev(w, "typeof captured !== 'undefined' ? {black:captured.black,white:captured.white} : null", null);
}

// 設定値
function getSetting(w, name) {
  return ev(w, `typeof ${name} !== 'undefined' ? ${name} : null`, null);
}

function installHooks() {
  const w = getIframeWin();
  if (!w || !w.document) {
    log("iframe が読み込まれていません", "e");
    return;
  }

  let wrappedCount = 0;
  let missingCount = 0;
  const missing = [];

  // (0) v53〜: 本体からの直接通知レシーバー（customEvent 用）
  // 本体コードで window.__RSG_EVENT__('PRO_010') のように呼ばれたら発火
  w.__RSG_EVENT__ = (id) => {
    fire(id);
  };

  // v0.5〜: iframe 内の console.warn / console.log を event_check のログ欄にも出力
  //   [SAFETY] や [DIAG] のキーワードを含むものだけ拾う（ノイズ削減）
  try {
    if (!w.__RSG_CONSOLE_PATCHED__) {
      const origWarn = w.console.warn.bind(w.console);
      const origLog  = w.console.log.bind(w.console);
      w.console.warn = function(...args) {
        origWarn(...args);
        try {
          const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
          if (msg.indexOf('[SAFETY]') >= 0 || msg.indexOf('[DIAG') >= 0) {
            log('⚠ ' + msg, 'w');
          }
        } catch(e) {}
      };
      w.console.log = function(...args) {
        origLog(...args);
        try {
          const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
          if (msg.indexOf('[SAFETY]') >= 0 || msg.indexOf('[DIAG') >= 0) {
            log('ℹ ' + msg, 'i');
          }
        } catch(e) {}
      };
      w.__RSG_CONSOLE_PATCHED__ = true;
    }
  } catch(e) { log('console パッチ失敗: ' + e.message, 'e'); }

  // (1) 関数 wrap 系
  for (const ev of EVENTS) {
    if (ev.hook.type !== "wrap") continue;
    const fn = w[ev.hook.fn];
    if (typeof fn !== "function") {
      missing.push(`${ev.id}:${ev.hook.fn}`);
      missingCount++;
      continue;
    }
    const original = fn;
    const id = ev.id;
    w[ev.hook.fn] = function(...args) {
      fire(id);
      return original.apply(this, args);
    };
    wrappedCount++;
  }

  // (2) showPage 経由の NAV 系
  if (typeof w.showPage === "function") {
    const orig = w.showPage;
    w.showPage = function(page, ...rest) {
      const map = {
        "main": "NAV_001",
        "game-setup": "NAV_002",
        "custom": "NAV_003",
        "account": "NAV_004",
        "daily": "NAV_005",
        "trophies": "NAV_006",
        "rules": "NAV_007",
        "kifu": "NAV_008",
      };
      if (map[page]) fire(map[page]);
      return orig.call(this, page, ...rest);
    };
    wrappedCount++;
  } else {
    missing.push("showPage");
  }

  // (2b) render 経由の コウ表示系（GAM_006〜GAM_009）
  if (typeof w.render === "function") {
    const origRender = w.render;
    w.render = function(validMoves, koRestrictedSet, koBlockedMoves, ...rest) {
      try {
        // クロスフレーム対応：instanceof ではなく duck-typing で判定
        const vLen = Array.isArray(validMoves) ? validMoves.length : 0;
        const bLen = Array.isArray(koBlockedMoves) ? koBlockedMoves.length : 0;
        const rSize = (koRestrictedSet && typeof koRestrictedSet.size === 'number') ? koRestrictedSet.size : 0;
        // GAM_006: オレンジセル（CP制限）
        if (rSize > 0) fire("GAM_006");
        // GAM_007: 赤セル（Koブロック）
        if (bLen > 0) fire("GAM_007");
        // GAM_008: コウ例外発動 — validMoves に Ko-blockedセルが含まれる
        if (bLen > 0 && vLen > 0) {
          const blockedKeys = new Set(koBlockedMoves.map(c => c.join(",")));
          const exception = validMoves.some(c => blockedKeys.has(c.join(",")));
          if (exception) fire("GAM_008");
        }
        // GAM_009: 黄色ドット（有効手）
        if (vLen > 0) fire("GAM_009");
      } catch (e) {}
      return origRender.apply(this, [validMoves, koRestrictedSet, koBlockedMoves, ...rest]);
    };
    wrappedCount++;
  } else {
    missing.push("render");
  }

  // (3) playSound 経由の SND 系
  if (typeof w.playSound === "function") {
    const orig = w.playSound;
    const sndMap = {
      "place": "SND_001", "flip": "SND_002", "capture": "SND_003",
      "win": "SND_004", "lose": "SND_005", "draw": "SND_006",
    };
    w.playSound = function(key, ...rest) {
      if (sndMap[key]) fire(sndMap[key]);
      // ANTI_011: サウンド OFF なのに音が実際に再生される
      // ゲーム本体の playSound 内部で soundEnabled をチェックして return する場合は
      // 実際には音は鳴らないので、本体関数の中身を確認してから判定
      const sndOff = getSetting(w, "soundEnabled") === false;
      const result = orig.call(this, key, ...rest);
      // 本体が soundEnabled チェックを持たない場合のみ trip
      // （本体ソースに guard あり確認済み → 呼び出しだけでは誤検出しない）
      if (sndOff && result !== undefined) {
        trip("ANTI_011", `playSound("${key}") returned value while sound OFF`);
      }
      return result;
    };
    wrappedCount++;
  } else {
    missing.push("playSound");
  }

  // (4) endGame 経由の WIN 系
  if (typeof w.endGame === "function") {
    const orig = w.endGame;
    w.endGame = function(...args) {
      const result = orig.apply(this, args);
      // 結果判定（盤面石数 + 取得済み から計算）
      try {
        const cnt = countBoard(w);
        const cap = getCaptured(w);
        const human = getSetting(w, "humanColor");
        if (cnt && cap) {
          const sB = cnt.nB + (cap.black || 0);
          const sW = cnt.nW + (cap.white || 0);
          let resultStr = null;
          if (sB > sW) resultStr = "black";
          else if (sB < sW) resultStr = "white";
          else resultStr = "draw";
          if (resultStr === "draw") fire("WIN_003");
          else if (resultStr === human) fire("WIN_001");
          else fire("WIN_002");
          fire("WIN_005"); // 結果モーダル
        } else {
          // ANTI_009: 結果が判定できなかった（スコア読取失敗）
          trip("ANTI_009", "score read failed");
        }

        // ANTI_009 補強: 結果モーダルが正しく表示されたか遅延検査
        // 自動テスト中はモーダルを即座に閉じるため、遅延チェックはスキップ
        if (state.autoTesting) { /* skip */ }
        else setTimeout(() => {
          try {
            const modalCheck = ev(w, `(() => {
              const m = document.getElementById('result-modal');
              const t = document.getElementById('result-text');
              if (!m || m.style.display === 'none') return 'hidden';
              if (!t || !t.textContent || t.textContent.trim() === '') return 'empty';
              return 'ok';
            })()`, "error");
            if (modalCheck === "hidden") {
              trip("ANTI_009", "result-modal not visible after endGame");
            } else if (modalCheck === "empty") {
              trip("ANTI_009", "result-text is empty after endGame");
            } else if (modalCheck === "error") {
              trip("ANTI_009", "result-modal check failed");
            }
          } catch (e2) {
            log("ANTI_009 遅延検査エラー: " + e2.message, "w");
          }
        }, 1500);
      } catch (e) {
        log("endGame hook 内エラー: " + e.message, "w");
      }
      return result;
    };
  }

  // (5) MutationObserver でクラス検出（ANM 系）
  try {
    function checkClsEvents(el) {
      const cls = el.getAttribute ? (el.getAttribute("class") || "") : "";
      if (!cls) return;
      for (const ev of EVENTS) {
        if (ev.hook.type === "cls" && cls.indexOf(ev.hook.cls) >= 0) {
          fire(ev.id);
        }
      }
    }
    const observer = new MutationObserver((mutations) => {
      for (const m of mutations) {

    log("MDL_010/MSC_005 リスナー登録エラー: " + e.message, "w");
  }

  // MSC_003: 1手戻す無効化 — undoMove フック内で undo 不可状態を検出
  if (typeof w.undoMove === "function") {
    const origUndo = w.undoMove;
    w.undoMove = function(...args) {
      const result = origUndo.apply(this, args);
      // undo 後にボタンが無効化されたか、または undoState が空になったか検出
      try {
        const undoBtn = w.document.getElementById("undo-btn") ||
                        w.document.getElementById("btn-undo") ||
                        w.document.querySelector("[data-action='undo']") ||
                        w.document.querySelector(".undo-btn");
        if (undoBtn && (undoBtn.disabled || undoBtn.classList.contains("disabled"))) {
          fire("MSC_003");
        }
        // undoState が空なら無効化とみなす
        const undoEmpty = ev(w,
          "typeof undoState !== 'undefined' ? (undoState === null || (Array.isArray(undoState) && undoState.length === 0)) : null",
          null);
        if (undoEmpty === true) {
          fire("MSC_003");
        }
      } catch (e) {}
      return result;
    };
  }

  state.hooked = true;
  log(`✅ フック注入完了: ${wrappedCount} 件 / 不在 ${missingCount} 件`, "ok");
  if (missing.length > 0) {
    log(`(不在関数: ${missing.slice(0, 5).join(", ")}${missing.length > 5 ? ` ...他 ${missing.length - 5}` : ""})`, "w");
  }
  updateUI();
}

// モーダルの自動閉じ — 既知の ID を直接クリック ＋ 汎用フォールバック
// skipResult=true の時は result-modal 系ボタンをスキップ（ゲーム終了検出用）
function dismissModals(skipResult) {
  try {
    const skip = skipResult ? 'yes' : '';
    ae(`(() => {
      // --- 既知のボタンを直接クリック（最速・最確実） ---
      const skipResult = '${skip}';
      const knownBtns = [
        'pass-ok',           // パスモーダル OK
        'turn-ok',           // ターンモーダル OK
        'rankup-ok-btn',     // ランクアップ OK
        'level-unlock-ok-btn', // レベル解放 OK
        'promo-ok',          // 昇格 OK
        'ko-ok',             // コウ OK
        'quit-cancel',       // 中断キャンセル
      ];
      // result-modal 系は skipResult でなければ追加
      if (!skipResult) {
        knownBtns.push('play-again-btn', 'btn-play-again', 'playagain-btn', 'result-ok');
      }
      for (const id of knownBtns) {
        const b = document.getElementById(id);
        if (b) {
          const pm = b.closest('[id*="modal"], [style*="display"]') || b.parentElement;
          if (pm && getComputedStyle(pm).display !== 'none') {
            b.click(); return 'known:' + id;
          }
        }
      }

      // --- 既知のモーダル container を直接探す ---
      const knownModals = [
        'pass-modal', 'result-modal', 'turn-modal',
        'rankup-modal', 'level-unlock-modal', 'promo-announce-modal',
        'ko-message', 'ko-modal', 'quit-confirm-modal',
      ];
      for (const mid of knownModals) {
        const m = document.getElementById(mid);
        if (m && getComputedStyle(m).display !== 'none') {
          const btns = m.querySelectorAll('button');
          for (const b of btns) {
            b.click(); return 'modal:' + mid;
          }
        }
      }

      // --- 汎用フォールバック: modal/overlay を含む要素内の見えるボタン ---
      const allModals = document.querySelectorAll('[id*="modal"], [class*="modal"], [id*="overlay"], [class*="overlay"], [id*="popup"], [class*="popup"]');
      for (const m of allModals) {
        if (getComputedStyle(m).display === 'none') continue;
        const btns = m.querySelectorAll('button');
        for (const b of btns) {
          if (getComputedStyle(b).display !== 'none') {
            b.click(); return 'generic:' + (m.id || '?');
          }
        }
      }
      return null;
    })()`);
  } catch (e) {}
}

// モーダル自動クリックのインターバル（開始/停止制御）
let _modalInterval = null;
let _modalSkipResult = false;
function startModalAutoDismiss(skipResult) {
  _modalSkipResult = !!skipResult;
  if (_modalInterval) return;
  _modalInterval = setInterval(() => dismissModals(_modalSkipResult), 150);
}
function stopModalAutoDismiss() {
  if (_modalInterval) { clearInterval(_modalInterval); _modalInterval = null; }
}

// 自動プレイ用: ゲーム内の思考待ち時間を 0 にパッチ
function patchCpuSpeed() {
  try {
    // setTimeout を一時的にパッチして cpuPlay 内の待ち時間を 0 にする
    const w = getWin();
    if (!w._origSetTimeout) {
      w._origSetTimeout = w.setTimeout;
      w.setTimeout = function(fn, delay, ...args) {
        // 300ms以上の遅延（思考時間）は 10ms に短縮
        const d = (delay && delay >= 300) ? 10 : delay;
        return w._origSetTimeout(fn, d, ...args);
      };
    }
  } catch (e) {}
}
function unpatchCpuSpeed() {
  try {
    const w = getWin();
    if (w._origSetTimeout) {
      w.setTimeout = w._origSetTimeout;
      delete w._origSetTimeout;
    }
  } catch (e) {}
}

// CPU vs CPU で 1 試合を自動プレイ
let _cpuBusy = false;
async function autoPlayOneGame(gameNum) {
  // result-modal を閉じてからゲーム開始
  dismissModals(false);
  ae("typeof showPage === 'function' && showPage('game-setup')");
  await sleep(50);
  ae(`
    battleMode = 'cpu';
    cpuLevel = 2;
    humanColor = 'black';
    cpuColor = 'white';
    animationsEnabled = false;
    soundEnabled = false;
    cpuSpeedLevel = 3;
    typeof startGame === 'function' && startGame();
  `);
  await sleep(50);

  const maxWait = 30000; // v54〜: 本体側 moveHistory>80 安全弁が確実に発動する余裕を確保
  const maxMoves = 90;   // 本体側は 80 手で終局させるので、こちらは 90 でフォールバック
  const startTime = Date.now();
  _cpuBusy = false;

  while (!autoAbort) {
    if (isGameOver()) {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      if (gameNum % 10 === 0 || gameNum <= 3) {
        autoOk(`第 ${gameNum} 局 終了 (${elapsed}s)`);
      }
      return true;
    }

    // コウ無限ループ検出: 手数が異常に多い場合は強制終了
    const moveCount = ae("typeof moveHistory !== 'undefined' ? moveHistory.length : 0", 0);
    if (moveCount > maxMoves) {
      autoErr(`第 ${gameNum} 局 コウループ検出 (${moveCount}手) — 強制終了`);
      _cpuBusy = false;
      return false;
    }

    if (!_cpuBusy) {
      try {
        const isHumanTurn = ae("current === humanColor", false);
        if (isHumanTurn) {
          _cpuBusy = true;
          const p = ae("cpuPlay()");
          if (p && typeof p.then === 'function') {
            p.then(() => { _cpuBusy = false; }).catch(() => { _cpuBusy = false; });
          } else {
            _cpuBusy = false;
          }
        }
      } catch (e) { _cpuBusy = false; }
    }

    await sleep(30);

    if (Date.now() - startTime > maxWait) {
      // v0.5〜: タイムアウト時の詳細ダンプで原因特定を支援
      const dump = ae(`(() => {
        try {
          const resultModal = document.getElementById('result-modal');
          const passModal = document.getElementById('pass-modal');
          const stones = typeof board !== 'undefined' ? Object.values(board).filter(v => v !== null).length : -1;
          return {
            mv: typeof moveHistory !== 'undefined' ? moveHistory.length : '?',
            bh: typeof boardHistory !== 'undefined' ? boardHistory.length : '?',
            cur: typeof current !== 'undefined' ? current : '?',
            hm: typeof humanColor !== 'undefined' ? humanColor : '?',
            pKE: typeof prevKoException !== 'undefined' ? prevKoException : '?',
            anim: typeof isAnimating !== 'undefined' ? isAnimating : '?',
            rm: resultModal ? (resultModal.style.display || 'empty') : 'missing',
            pm: passModal ? (passModal.style.display || 'empty') : 'missing',
            stones: stones,
            cpuBusy: typeof _cpuBusy !== 'undefined' ? _cpuBusy : '?'
          };
        } catch(e) { return { err: e.message }; }
      })()`, null);
      autoErr(`第 ${gameNum} 局 タイムアウト ${JSON.stringify(dump)}`);
      _cpuBusy = false;
      return false;
    }
  }
  return false;
}

// Phase A: CPU 対戦自動プレイ（100 局）
async function phaseA() {
  autoLog("=== Phase A: CPU 対戦 (Lv.2 ランダム×100) ===");
  const games = 100;
  let ok = 0, ng = 0;
  const w = getWin();

  // localStorage をクリアして蓄積データ（ランク・勝利数等）を防止
  try {
    w.localStorage.clear();
    autoLog("localStorage クリア完了");
  } catch(e) { autoLog("localStorage クリア失敗: " + e.message); }

  w.prompt = (msg, def) => def || 'auto-test';
  w.confirm = () => true;
  // パスモーダル等は自動クリック、result-modal はスキップ（終了検出に使う）
  startModalAutoDismiss(true);
  // v0.5〜: 思考時間パッチを有効化（これが無いと 1 手 350-550ms × 60 手超でタイムアウト）
  patchCpuSpeed();

  updateAutoProgress(`Phase A: CPU対戦 (0/${games})`);
  for (let i = 1; i <= games; i++) {
    if (autoAbort) return;
    if (i % 10 === 0) {
      updateAutoProgress(`Phase A: CPU対戦 (${i}/${games}) OK:${ok} NG:${ng}`);

    const result = await autoPlayOneGame(i);
    if (result) ok++; else ng++;
  }
  unpatchCpuSpeed();
  stopModalAutoDismiss();
  autoOk(`Phase A 完了: ${ok}局完了 / ${ng}局タイムアウト`);
}

    if (!autoAbort) await phaseJ(); // 2人対戦
    if (!autoAbort) await phaseK(); // ゲーム中断
    if (!autoAbort) await phaseL(); // 昇格試験
    if (!autoAbort) await phaseM(); // ランクアップ・Undo・その他

    if (autoAbort) {
      autoLog("自動テスト中断");
    } else {
      autoOk(`=== 自動テスト完了 === EVENT: ${state.fired.size}/${EVENTS.length}  ANTI違反: ${state.tripped.size}`);
    }
  } catch (e) {
    autoErr("自動テスト エラー: " + e.message);
  }

  stopModalAutoDismiss();
  autoRunning = false;
  autoAbort = false;
  state.autoTesting = false;
  btn.textContent = "🤖 自動テスト開始";
  btn.classList.remove("running");
  updateAutoProgress("");
  updateUI();
}

document.getElementById("btn-auto").onclick = () => {
  runAutoTest();
};

// 初期化
buildEventList();
buildAntiList();
updateUI();
log("v0.5 起動。「ゲーム読込」ボタンから始めてください。", "i");
</script>
